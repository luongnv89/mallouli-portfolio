default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        stages: [pre-commit]
        exclude: ^(dist/|node_modules/|.*\.svg$)
      - id: end-of-file-fixer
        stages: [pre-commit]
        exclude: ^(dist/|node_modules/|.*\.svg$)
      - id: check-merge-conflict
        stages: [pre-commit]
      - id: check-yaml
        stages: [pre-commit]
      - id: check-json
        stages: [pre-commit]
        exclude: ^(node_modules|dist)/
      - id: check-added-large-files
        args: ['--maxkb=1024']
        stages: [pre-commit]

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        stages: [pre-commit]
        args: ['--baseline', '.secrets.baseline']
        exclude: ^(package-lock\.json|node_modules/|dist/|\.secrets\.baseline$)

  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: npx eslint
        language: system
        files: \.(js|jsx|ts|tsx)$
        exclude: ^(node_modules|dist)/
        stages: [pre-commit]

      - id: vite-build
        name: vite build (push)
        entry: npm run build
        language: system
        pass_filenames: false
        stages: [pre-push]
